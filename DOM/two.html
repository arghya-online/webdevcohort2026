<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

  <script>
    setTimeout(() => {

      document.body.appendChild(newElement);
    }, 2000);
